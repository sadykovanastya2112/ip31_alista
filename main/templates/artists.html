{% extends "base.html" %}
{% block title %}Исполнители{% endblock title %}
{% block content %}
    <table>
        <thead>
            <tr>
                <th>№</th>
                <th>Название</th>
                <th>Фото</th>
                <th></th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for a in artists %}
                <tr>
                    <td>{{ a.id }}</td>
                    <td>{{ a.name }}</td>
                    <td><img class="artists_logo" src="/media/{{a.image}}" alt=""></td>
                    <td><a href="/editarist/{{a.id}}">Редактирова</a></td>
                    <td><a href="/deleteartist/{{a.id}}">Удалить</a></td>
                </tr>
                {% endfor %}
        </tbody>
    </table>
<a href="/add_artist">Добавить исполнителя</a>
{% endblock content %}
